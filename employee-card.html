<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Card – Rawajeh</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f0ebe5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(80,56,36,0.13);
    }
    .banner {
      background: #503824;
      height: 140px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }
    .logo { height: 80px; width: auto; max-width: 220px; object-fit: contain; }
    .avatar-wrap {
      position: absolute;
      bottom: -54px; left: 50%;
      transform: translateX(-50%);
    }
    .avatar {
      width: 108px; height: 108px;
      border-radius: 50%;
      border: 4px solid #fff;
      object-fit: cover;
      display: block;
      box-shadow: 0 4px 16px rgba(80,56,36,0.18);
      background: #e8e0d8;
    }
    .body { padding: 68px 28px 28px; text-align: center; }
    .name    { font-size: 1.45rem; font-weight: 700; color: #1a1008; letter-spacing: -0.01em; margin-bottom: 4px; }
    .title   { font-size: 0.9rem; color: #503824; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .company { font-size: 0.85rem; color: #8a7060; margin-bottom: 24px; }
    .divider { height: 1px; background: #ece5dc; margin: 0 0 22px; }
    .contact-list {
      list-style: none; text-align: left;
      display: flex; flex-direction: column;
      gap: 14px; margin-bottom: 24px;
    }
    .contact-list li { display: flex; align-items: center; gap: 14px; }
    .icon-wrap {
      width: 40px; height: 40px; border-radius: 10px;
      background: #f5ede4;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg { width: 18px; height: 18px; fill: #503824; }
    .contact-text { display: flex; flex-direction: column; justify-content: center; }
    .contact-label {
      font-size: 0.68rem; color: #a89080;
      text-transform: uppercase; letter-spacing: 0.07em;
      font-weight: 600; line-height: 1; margin-bottom: 3px;
    }
    .contact-value {
      font-size: 0.88rem; color: #2a1a0e;
      font-weight: 500; line-height: 1.3; text-decoration: none;
    }
    a.contact-value:hover { color: #503824; text-decoration: underline; }
    .social-row {
      display: flex; justify-content: center;
      gap: 14px; margin-bottom: 24px;
    }
    .social-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: #f5ede4;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .social-btn:hover { background: #503824; transform: translateY(-2px); }
    .social-btn:hover svg { fill: #fff; }
    .social-btn svg { width: 18px; height: 18px; fill: #503824; transition: fill 0.2s; }
    .save-btn {
      display: block; width: 100%; padding: 15px;
      background: #503824; color: #fff;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.06em; text-align: center;
      border: none; border-radius: 12px; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-transform: uppercase;
    }
    .save-btn:hover { background: #3a2718; transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); }
    .not-found { text-align: center; padding: 60px 28px; color: #8a7060; font-size: 1rem; }
    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; background: #fff; }
      .card { border-radius: 0; max-width: 100%; min-height: 100vh; box-shadow: none; }
      .banner { height: 130px; }
      .logo { height: 68px; }
      .avatar { width: 96px; height: 96px; }
      .avatar-wrap { bottom: -48px; }
      .body { padding: 62px 22px 32px; }
      .name { font-size: 1.3rem; }
    }
  </style>

  </div>
</div>

<script>
// ── Format mobile: 966XXXXXXXXX → 05XXXXXXXXX, short numbers keep as-is
function fmtMobile(n) {
  if (!n) return '';
  var s = String(n).trim();
  if (s.startsWith('966') && s.length >= 12) return '0' + s.slice(3);
  if (s.startsWith('91')  && s.length >= 12) return '+' + s; // Indian numbers
  if (s.length <= 9) return '0' + s; // Luxury short numbers
  return s;
}

// ── Format office phone: 966920001269 → 9200 0126 9
function fmtPhone(n) {
  if (!n) return '';
  var s = String(n).trim();
  if (s.startsWith('966')) s = s.slice(3);
  if (s.length === 9) return s.slice(0,4) + ' ' + s.slice(4,8) + ' ' + s.slice(8);
  return s;
}

// ── Render ──────────────────────────────────────────────────────────
var params = new URLSearchParams(window.location.search);
var id     = (params.get('id') || '').toUpperCase();
var emp    = employees[id];

if (!emp) {
  document.getElementById('body').innerHTML = '<div class="not-found">Employee not found.<br>Please check the QR code or URL.</div>';
  document.querySelector('.avatar-wrap').style.display = 'none';
} else {
  document.getElementById('name').textContent    = emp.name;
  document.getElementById('title').textContent   = emp.title;
  document.getElementById('company').textContent = emp.company;
  document.getElementById('avatar').src          = 'images/' + id + '.png';
  document.getElementById('avatar').alt          = emp.name;
  document.title                                 = emp.name + ' – ' + emp.company;

  var html = '';

  if (emp.mobile) {
    var mob = fmtMobile(emp.mobile);
    html += '<li><div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-5 18a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5-4H7V5h10v11z"/></svg></div><div class="contact-text"><span class="contact-label">Mobile</span><a class="contact-value" href="tel:+' + emp.mobile + '">' + mob + '</a></div></li>';
  }

  if (emp.phone && emp.phone !== emp.mobile) {
    var ph = fmtPhone(emp.phone);
    html += '<li><div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.36 11.36 0 0 0 3.56.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C9.61 21 3 14.39 3 6a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.56a1 1 0 0 1-.25 1.01l-2.2 2.22z"/></svg></div><div class="contact-text"><span class="contact-label">Phone</span><a class="contact-value" href="tel:+' + emp.phone + '">' + ph + '</a></div></li>';
  }

  if (emp.email) {
    html += '<li><div class="icon-wrap"><svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg></div><div class="contact-text"><span class="contact-label">Email</span><a class="contact-value" href="mailto:' + emp.email + '">' + emp.email + '</a></div></li>';
  }

  document.getElementById('contact-list').innerHTML = html;
}

// ── Save Contact ─────────────────────────────────────────────────────
function saveContact() {
  if (!emp) return;
  var lines = ['BEGIN:VCARD','VERSION:3.0',
    'FN:' + emp.name,
    'N:' + emp.name.split(' ').reverse().join(';') + ';;;',
    'ORG:' + emp.company,
    'TITLE:' + emp.title,
  ];
  if (emp.mobile) lines.push('TEL;TYPE=CELL:+' + emp.mobile);
  if (emp.phone && emp.phone !== emp.mobile) lines.push('TEL;TYPE=WORK,VOICE:+' + emp.phone);
  if (emp.email)  lines.push('EMAIL;TYPE=WORK:' + emp.email);
  lines.push('URL:https://www.rawajeh.com');
  lines.push('X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/company/rawajeh-group/');
  lines.push('X-SOCIALPROFILE;TYPE=twitter:https://x.com/rawajeh_group');
  lines.push('END:VCARD');

  var blob = new Blob([lines.join('\r\n')], { type: 'text/vcard' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = emp.name.replace(' ','_') + '.vcf';
  a.click();
  URL.revokeObjectURL(url);
}
