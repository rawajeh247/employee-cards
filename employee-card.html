<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omer Berhan – Rawajeh Holding</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0ebe5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(80,56,36,0.13);
    }

    /* ── Banner ── */
    .banner {
      background: #503824;
      height: 120px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    .logo {
      height: 52px;
      width: auto;
      max-width: 180px;
      object-fit: contain;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: absolute;
      bottom: -54px;
      left: 50%;
      transform: translateX(-50%);
    }

    .avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 4px solid #fff;
      object-fit: cover;
      display: block;
      box-shadow: 0 4px 16px rgba(80,56,36,0.18);
      background: #e8e0d8;
    }

    /* ── Body ── */
    .body {
      padding: 68px 28px 28px;
      text-align: center;
    }

    .name {
      font-size: 1.45rem;
      font-weight: 700;
      color: #1a1008;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .title {
      font-size: 0.9rem;
      color: #503824;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .company {
      font-size: 0.85rem;
      color: #8a7060;
      margin-bottom: 24px;
    }

    .divider {
      height: 1px;
      background: #ece5dc;
      margin: 0 0 22px;
    }

    /* ── Contact list ── */
    .contact-list {
      list-style: none;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .contact-list li {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #f5ede4;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 18px;
      height: 18px;
      fill: #503824;
    }

    .contact-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-label {
      font-size: 0.68rem;
      color: #a89080;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 3px;
    }

    .contact-value {
      font-size: 0.88rem;
      color: #2a1a0e;
      font-weight: 500;
      line-height: 1.3;
      text-decoration: none;
    }

    a.contact-value:hover { color: #503824; text-decoration: underline; }

    /* ── Social icons ── */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #f5ede4;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .social-btn:hover { background: #503824; transform: translateY(-2px); }
    .social-btn:hover svg { fill: #fff; }

    .social-btn svg {
      width: 18px;
      height: 18px;
      fill: #503824;
      transition: fill 0.2s;
    }

    /* ── Save button ── */
    .save-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: #503824;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-align: center;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-transform: uppercase;
    }

    .save-btn:hover { background: #3a2718; transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); }

    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; background: #fff; }
      .card { border-radius: 0; max-width: 100%; min-height: 100vh; box-shadow: none; }
      .banner { height: 110px; }
      .logo { height: 46px; }
      .avatar { width: 96px; height: 96px; }
      .avatar-wrap { bottom: -48px; }
      .body { padding: 62px 22px 32px; }
      .name { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="card" id="card">

  <div class="banner">
    <img src="images/Rawajeh-Logo.png" alt="Rawajeh" class="logo" />
    <div class="avatar-wrap">
      <img src="images/OB.png" alt="Omer Berhan" class="avatar" id="avatar" />
    </div>
  </div>

  <div class="body">
    <div class="name" id="name">Omer Berhan</div>
    <div class="title" id="title">IT Manager</div>
    <div class="company" id="company">Rawajeh Holding</div>

    <div class="divider"></div>

    <ul class="contact-list">

      <!-- Mobile -->
      <li>
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-5 18a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm5-4H7V5h10v11z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Mobile</span>
          <a class="contact-value" href="tel:+966553030487" id="mobile">0553030487</a>
        </div>
      </li>

      <!-- Phone / Ext -->
      <li>
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.36 11.36 0 0 0 3.56.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C9.61 21 3 14.39 3 6a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.56a1 1 0 0 1-.25 1.01l-2.2 2.22z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Phone / Ext</span>
          <a class="contact-value" href="tel:+966920016290" id="phone">9200 1629 Ext 123</a>
        </div>
      </li>

      <!-- Email -->
      <li>
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="contact-text">
          <span class="contact-label">Email</span>
          <a class="contact-value" href="mailto:oberhan@rawajeh.com" id="email">oberhan@rawajeh.com</a>
        </div>
      </li>

    </ul>

    <!-- Social -->
    <div class="social-row">

      <a class="social-btn" href="https://www.linkedin.com/company/rawajeh-group/" target="_blank" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>

      <a class="social-btn" href="https://x.com/rawajeh_group?s=21&t=TYO145M7OjCt98gSCjJsuA" target="_blank" aria-label="X">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
      </a>

      <a class="social-btn" href="https://www.rawajeh.com" target="_blank" aria-label="Website">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </a>

    </div>

    <button class="save-btn" onclick="saveContact()">Save Contact</button>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const id     = (params.get('id') || 'OB').toUpperCase();

  const employees = {
    OB: {
      name:         'Omer Berhan',
      title:        'IT Manager',
      company:      'Rawajeh Holding',
      mobile:       '+966553030487',
      mobileDisplay:'0553030487',
      phone:        '+966920016290',
      phoneDisplay: '9200 1629 Ext 123',
      email:        'oberhan@rawajeh.com',
      website:      'https://www.rawajeh.com',
    }
  };

  const emp = employees[id];

  if (emp) {
    document.getElementById('name').textContent    = emp.name;
    document.getElementById('title').textContent   = emp.title;
    document.getElementById('company').textContent = emp.company;
    document.getElementById('mobile').textContent  = emp.mobileDisplay;
    document.getElementById('mobile').href         = 'tel:' + emp.mobile;
    document.getElementById('phone').textContent   = emp.phoneDisplay;
    document.getElementById('phone').href          = 'tel:' + emp.phone;
    document.getElementById('email').textContent   = emp.email;
    document.getElementById('email').href          = 'mailto:' + emp.email;
    document.getElementById('avatar').src          = 'images/' + id + '.png';
    document.getElementById('avatar').alt          = emp.name;
    document.title                                 = emp.name + ' – ' + emp.company;
  }

  function saveContact() {
    if (!emp) return;
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:' + emp.name,
      'N:' + emp.name.split(' ').reverse().join(';') + ';;;',
      'ORG:' + emp.company,
      'TITLE:' + emp.title,
      'TEL;TYPE=CELL:' + emp.mobile,
      'TEL;TYPE=WORK,VOICE:' + emp.phone,
      'EMAIL;TYPE=WORK:' + emp.email,
      'URL:' + emp.website,
      'X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/company/rawajeh-group/',
      'X-SOCIALPROFILE;TYPE=twitter:https://x.com/rawajeh_group',
      'END:VCARD'
    ].join('\r\n');

    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = emp.name.replace(' ', '_') + '.vcf';
    a.click();
    URL.revokeObjectURL(url);
  }
</script>

</body>
</html>
